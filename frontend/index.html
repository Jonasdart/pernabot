<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pernabot Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>
    
    <div class="container">
        <header class="header">
            <h1>Pernabot Dashboard</h1>
            <p>Acompanhe o tempo de jogo e desempenho da pelada</p>
        </header>

        <main>
            <section id="sessions-view" class="view active">
                <div class="glass-card">
                    <h2>Histórico de Peladas</h2>
                    <div id="sessions-list" class="sessions-list">
                        <!-- Sessions will be injected here -->
                        <div class="loader"></div>
                    </div>
                </div>
            </section>

            <section id="players-view" class="view">
                <button id="back-btn" class="btn secondary">← Voltar</button>
                <div class="glass-card">
                    <h2 id="session-title">Estatísticas da Pelada</h2>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <h3>Total de Jogadores</h3>
                            <p id="total-players">0</p>
                        </div>
                    </div>
                    
                    <div class="table-container">
                        <table class="players-table">
                            <thead>
                                <tr>
                                    <th>Pos</th>
                                    <th>Nome</th>
                                    <th>Partidas</th>
                                    <th>Tempo Estimado</th>
                                </tr>
                            </thead>
                            <tbody id="players-list">
                                <!-- Players will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
