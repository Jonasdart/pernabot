<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pernabot Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>
    
    <div class="container">
        <header class="header">
            <h1>Pernabot Dashboard</h1>
            <p>Acompanhe o tempo de jogo e desempenho da pelada</p>
        </header>

        <main>
            <section id="sessions-view" class="view active">
                <div class="glass-card">
                    <div class="section-title-bar">
                        <h2>Histórico de Peladas</h2>
                        <button id="refresh-sessions-btn" class="btn secondary sm" title="Atualizar">🔄 Atualizar</button>
                    </div>
                    <div id="sessions-list" class="sessions-list">
                        <!-- Sessions will be injected here -->
                        <div class="loader"></div>
                    </div>
                </div>
            </section>

            <section id="players-view" class="view">
                <div class="view-header-actions">
                    <button id="back-btn" class="btn secondary">← Voltar</button>
                    <button id="refresh-btn" class="btn secondary" title="Atualizar dados">🔄 Atualizar</button>
                </div>
                <div class="glass-card">
                    <h2 id="session-title">Estatísticas da Pelada</h2>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <h3>Confirmados</h3>
                            <p id="total-confirmed">0</p>
                        </div>
                        <div class="stat-box">
                            <h3>Presentes na Quadra</h3>
                            <p id="total-arrived">0</p>
                        </div>
                        <div class="stat-box">
                            <h3>Pagantes</h3>
                            <p id="total-paying">0</p>
                        </div>
                    </div>
                    
                    <div class="tabs-nav">
                        <button class="tab-btn active" data-tab="tab-stats">⚽ Estatísticas</button>
                        <button class="tab-btn" data-tab="tab-presence">📋 Lista de Presença</button>
                        <button class="tab-btn" data-tab="tab-payment">💳 Pagantes</button>
                    </div>

                    <!-- Tab 1: Game Stats -->
                    <div id="tab-stats" class="tab-content active">
                        <div class="table-container">
                            <table class="players-table">
                                <thead>
                                    <tr id="stats-table-header">
                                        <th class="sortable" data-sort="pos">Pos <span class="sort-icon"></span></th>
                                        <th class="sortable" data-sort="name">Nome <span class="sort-icon"></span></th>
                                        <th class="sortable" data-sort="matches">Partidas <span class="sort-icon"></span></th>
                                        <th class="sortable" data-sort="frag">Frag (V/E/D) <span class="sort-icon"></span></th>
                                        <th class="sortable active desc" data-sort="pts">PTS <span class="sort-icon">▼</span></th>
                                        <th class="sortable" data-sort="time">Tempo <span class="sort-icon"></span></th>
                                    </tr>
                                </thead>
                                <tbody id="players-list">
                                    <!-- Stats players injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Tab 2: Presence List -->
                    <div id="tab-presence" class="tab-content">
                        <div class="table-container">
                            <table class="players-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Nome</th>
                                        <th>Status de Presença</th>
                                        <th>Pagamento</th>
                                    </tr>
                                </thead>
                                <tbody id="presence-list">
                                    <!-- Presence list injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Tab 3: Payment List -->
                    <div id="tab-payment" class="tab-content">
                        <div class="table-container">
                            <table class="players-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Nome</th>
                                        <th>Status de Pagamento</th>
                                    </tr>
                                </thead>
                                <tbody id="payment-list">
                                    <!-- Payment list injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
